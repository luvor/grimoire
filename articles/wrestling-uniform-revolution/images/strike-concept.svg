<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      text { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }
    </style>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Mesh pattern for ventilation zones -->
    <pattern id="meshPattern" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.5" fill="#00D4FF" opacity="0.15"/>
      <circle cx="3" cy="3" r="0.5" fill="#00D4FF" opacity="0.15"/>
    </pattern>
  </defs>

  <rect width="800" height="600" fill="#14141f"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#00D4FF" font-size="16" font-weight="600" letter-spacing="3">КОНЦЕПТ «СТРАЙК»</text>
  <line x1="260" y1="45" x2="540" y2="45" stroke="#00D4FF" stroke-width="0.5" opacity="0.3"/>
  <text x="400" y="62" text-anchor="middle" fill="#6b6b7b" font-size="11" letter-spacing="1">ВЫСОКОТЕХНОЛОГИЧНЫЙ МИНИМАЛИЗМ</text>

  <!-- ==================== FRONT VIEW ==================== -->
  <g transform="translate(240, 75)">
    <text x="0" y="0" text-anchor="middle" fill="#e8e6e3" font-size="12" font-weight="600" opacity="0.6">ПЕРЕД</text>

    <!-- Head -->
    <ellipse cx="0" cy="30" rx="22" ry="26" fill="#2a2a3a"/>
    <!-- Neck -->
    <rect x="-10" y="54" width="20" height="14" rx="4" fill="#2a2a3a"/>

    <!-- Main body - dark base suit -->
    <!-- Shoulder straps (10cm) -->
    <path d="M-42,68 L-48,72 L-50,80 L-45,82 L-38,76 L-30,70 L-22,68 Z" fill="#1a1a2e"/>
    <path d="M42,68 L48,72 L50,80 L45,82 L38,76 L30,70 L22,68 Z" fill="#1a1a2e"/>

    <!-- Torso -->
    <path d="M-44,74 L-48,100 L-50,130 L-48,160 L-44,175 L-38,182 L-28,188 L-18,194 L-18,280 L-10,283 L0,280 L10,283 L18,280 L18,194 L28,188 L38,182 L44,175 L48,160 L50,130 L48,100 L44,74 L30,69 L22,68 L-22,68 L-30,69 Z" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="0.5"/>

    <!-- Ventilation mesh zones - armpits -->
    <path d="M-44,80 L-48,95 L-48,115 L-44,115 L-42,95 L-42,82 Z" fill="url(#meshPattern)"/>
    <path d="M44,80 L48,95 L48,115 L44,115 L42,95 L42,82 Z" fill="url(#meshPattern)"/>
    <!-- Ventilation mesh - sides -->
    <path d="M-46,125 L-48,150 L-44,170 L-42,170 L-44,150 L-44,125 Z" fill="url(#meshPattern)"/>
    <path d="M46,125 L48,150 L44,170 L42,170 L44,150 L44,125 Z" fill="url(#meshPattern)"/>

    <!-- ===== ACCENT LINES - Muscle contours ===== -->
    <!-- Deltoid contours -->
    <path d="M-22,68 L-35,72 L-44,80 L-46,92" fill="none" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round" filter="url(#subtleGlow)"/>
    <path d="M22,68 L35,72 L44,80 L46,92" fill="none" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round" filter="url(#subtleGlow)"/>

    <!-- Pec outer contours -->
    <path d="M-22,74 L-30,85 L-32,100 L-22,108" fill="none" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round" filter="url(#subtleGlow)"/>
    <path d="M22,74 L30,85 L32,100 L22,108" fill="none" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round" filter="url(#subtleGlow)"/>

    <!-- Lat lines (lateral torso) -->
    <path d="M-44,115 L-46,140 L-44,165" fill="none" stroke="#00D4FF" stroke-width="2" stroke-linecap="round" filter="url(#subtleGlow)"/>
    <path d="M44,115 L46,140 L44,165" fill="none" stroke="#00D4FF" stroke-width="2" stroke-linecap="round" filter="url(#subtleGlow)"/>

    <!-- Quad outer contours -->
    <path d="M-18,200 L-16,230 L-14,260 L-14,278" fill="none" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round" filter="url(#subtleGlow)"/>
    <path d="M18,200 L16,230 L14,260 L14,278" fill="none" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round" filter="url(#subtleGlow)"/>

    <!-- ===== DIAGONAL ATTACK VECTOR ===== -->
    <line x1="-35" y1="72" x2="15" y2="270" stroke="#00D4FF" stroke-width="5" stroke-linecap="round" opacity="0.4" filter="url(#neonGlow)"/>
    <line x1="-35" y1="72" x2="15" y2="270" stroke="#00D4FF" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

    <!-- Small emblem on right chest -->
    <circle cx="18" cy="88" r="6" fill="none" stroke="#00D4FF" stroke-width="0.8" opacity="0.5"/>
    <circle cx="18" cy="88" r="2" fill="#00D4FF" opacity="0.3"/>

    <!-- Country code on left thigh - monospace engineering font -->
    <text x="-6" y="252" fill="#00D4FF" font-size="10" font-family="'Courier New', monospace" font-weight="600" letter-spacing="2" opacity="0.7">RUS</text>

    <!-- Arms (exposed skin) -->
    <path d="M-48,74 L-68,88 L-84,118 L-88,155 L-80,158 L-74,125 L-60,95 L-50,80 Z" fill="#2a2a3a"/>
    <path d="M48,74 L68,88 L84,118 L88,155 L80,158 L74,125 L60,95 L50,80 Z" fill="#2a2a3a"/>
    <ellipse cx="-86" cy="160" rx="8" ry="10" fill="#2a2a3a"/>
    <ellipse cx="86" cy="160" rx="8" ry="10" fill="#2a2a3a"/>

    <!-- Legs below shorts -->
    <path d="M-10,283 L-14,328 L-18,372 L-20,418 L-8,420 L-6,376 L-4,330 L0,283 Z" fill="#2a2a3a"/>
    <path d="M10,283 L14,328 L18,372 L20,418 L8,420 L6,376 L4,330 L0,283 Z" fill="#2a2a3a"/>
    <ellipse cx="-14" cy="423" rx="12" ry="6" fill="#2a2a3a"/>
    <ellipse cx="14" cy="423" rx="12" ry="6" fill="#2a2a3a"/>
  </g>

  <!-- ==================== BACK VIEW ==================== -->
  <g transform="translate(560, 75)">
    <text x="0" y="0" text-anchor="middle" fill="#e8e6e3" font-size="12" font-weight="600" opacity="0.6">СПИНА</text>

    <!-- Head -->
    <ellipse cx="0" cy="30" rx="22" ry="26" fill="#2a2a3a"/>
    <rect x="-10" y="54" width="20" height="14" rx="4" fill="#2a2a3a"/>

    <!-- Shoulder straps (back) -->
    <path d="M-42,68 L-48,72 L-50,80 L-45,82 L-38,76 L-30,70 L-22,68 Z" fill="#1a1a2e"/>
    <path d="M42,68 L48,72 L50,80 L45,82 L38,76 L30,70 L22,68 Z" fill="#1a1a2e"/>

    <!-- Torso (back) -->
    <path d="M-44,74 L-48,100 L-50,130 L-48,160 L-44,175 L-38,182 L-28,188 L-18,194 L-18,280 L-10,283 L0,280 L10,283 L18,280 L18,194 L28,188 L38,182 L44,175 L48,160 L50,130 L48,100 L44,74 L30,69 L22,68 L-22,68 L-30,69 Z" fill="#1a1a2e"/>

    <!-- Ventilation mesh zones - back sides -->
    <path d="M-44,80 L-48,95 L-48,115 L-44,115 L-42,95 L-42,82 Z" fill="url(#meshPattern)"/>
    <path d="M44,80 L48,95 L48,115 L44,115 L42,95 L42,82 Z" fill="url(#meshPattern)"/>

    <!-- ===== BACK ACCENT LINES ===== -->
    <!-- Trapezius contours -->
    <path d="M-18,68 L-28,75 L-38,85" fill="none" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round" filter="url(#subtleGlow)"/>
    <path d="M18,68 L28,75 L38,85" fill="none" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round" filter="url(#subtleGlow)"/>

    <!-- Lat contours (back) - V-shape -->
    <path d="M-20,90 L-38,110 L-46,140 L-44,170" fill="none" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round" filter="url(#subtleGlow)"/>
    <path d="M20,90 L38,110 L46,140 L44,170" fill="none" stroke="#00D4FF" stroke-width="2.5" stroke-linecap="round" filter="url(#subtleGlow)"/>

    <!-- Glute contours -->
    <path d="M-15,192 L-16,210 L-14,225" fill="none" stroke="#00D4FF" stroke-width="2" stroke-linecap="round" filter="url(#subtleGlow)"/>
    <path d="M15,192 L16,210 L14,225" fill="none" stroke="#00D4FF" stroke-width="2" stroke-linecap="round" filter="url(#subtleGlow)"/>

    <!-- Hamstring lines -->
    <path d="M-14,235 L-14,260 L-14,278" fill="none" stroke="#00D4FF" stroke-width="2" stroke-linecap="round" filter="url(#subtleGlow)"/>
    <path d="M14,235 L14,260 L14,278" fill="none" stroke="#00D4FF" stroke-width="2" stroke-linecap="round" filter="url(#subtleGlow)"/>

    <!-- UWW logo placeholder between shoulder blades -->
    <rect x="-8" y="82" width="16" height="8" rx="1" fill="none" stroke="#00D4FF" stroke-width="0.5" opacity="0.4"/>
    <text x="0" y="89" text-anchor="middle" fill="#00D4FF" font-size="5" opacity="0.4">UWW</text>

    <!-- Athlete name on lower back -->
    <text x="0" y="180" text-anchor="middle" fill="#00D4FF" font-size="7" font-family="'Courier New', monospace" letter-spacing="3" opacity="0.5">SEMENOV</text>

    <!-- Arms -->
    <path d="M-48,74 L-68,88 L-84,118 L-88,155 L-80,158 L-74,125 L-60,95 L-50,80 Z" fill="#2a2a3a"/>
    <path d="M48,74 L68,88 L84,118 L88,155 L80,158 L74,125 L60,95 L50,80 Z" fill="#2a2a3a"/>
    <ellipse cx="-86" cy="160" rx="8" ry="10" fill="#2a2a3a"/>
    <ellipse cx="86" cy="160" rx="8" ry="10" fill="#2a2a3a"/>

    <!-- Legs -->
    <path d="M-10,283 L-14,328 L-18,372 L-20,418 L-8,420 L-6,376 L-4,330 L0,283 Z" fill="#2a2a3a"/>
    <path d="M10,283 L14,328 L18,372 L20,418 L8,420 L6,376 L4,330 L0,283 Z" fill="#2a2a3a"/>
    <ellipse cx="-14" cy="423" rx="12" ry="6" fill="#2a2a3a"/>
    <ellipse cx="14" cy="423" rx="12" ry="6" fill="#2a2a3a"/>
  </g>

  <!-- ==================== LABELS ==================== -->

  <!-- Label: Accent lines (muscle contours) -->
  <g>
    <line x1="206" y1="155" x2="100" y2="155" stroke="#6b6b7b" stroke-width="0.5" stroke-dasharray="2,2"/>
    <circle cx="206" cy="155" r="2" fill="#00D4FF"/>
    <rect x="8" y="141" width="92" height="28" rx="3" fill="#1a1a28" stroke="#6b6b7b" stroke-width="0.5"/>
    <text x="54" y="155" text-anchor="middle" fill="#00D4FF" font-size="8">Контур мышц</text>
    <text x="54" y="165" text-anchor="middle" fill="#6b6b7b" font-size="6">яркие линии 3мм</text>
  </g>

  <!-- Label: Attack vector -->
  <g>
    <line x1="225" y1="225" x2="100" y2="225" stroke="#6b6b7b" stroke-width="0.5" stroke-dasharray="2,2"/>
    <circle cx="225" cy="225" r="2" fill="#00D4FF"/>
    <rect x="8" y="211" width="92" height="28" rx="3" fill="#1a1a28" stroke="#6b6b7b" stroke-width="0.5"/>
    <text x="54" y="225" text-anchor="middle" fill="#00D4FF" font-size="8">Вектор атаки</text>
    <text x="54" y="235" text-anchor="middle" fill="#6b6b7b" font-size="6">диагональ 8мм</text>
  </g>

  <!-- Label: Mesh ventilation -->
  <g>
    <line x1="198" y1="175" x2="100" y2="285" stroke="#6b6b7b" stroke-width="0.5" stroke-dasharray="2,2"/>
    <circle cx="198" cy="175" r="2" fill="#00D4FF"/>
    <rect x="8" y="275" width="92" height="28" rx="3" fill="#1a1a28" stroke="#6b6b7b" stroke-width="0.5"/>
    <text x="54" y="289" text-anchor="middle" fill="#00D4FF" font-size="8">Вентиляция</text>
    <text x="54" y="299" text-anchor="middle" fill="#6b6b7b" font-size="6">mesh-зоны</text>
  </g>

  <!-- Label: Country code -->
  <g>
    <line x1="240" y1="322" x2="100" y2="345" stroke="#6b6b7b" stroke-width="0.5" stroke-dasharray="2,2"/>
    <circle cx="240" cy="322" r="2" fill="#00D4FF"/>
    <rect x="8" y="335" width="92" height="28" rx="3" fill="#1a1a28" stroke="#6b6b7b" stroke-width="0.5"/>
    <text x="54" y="349" text-anchor="middle" fill="#00D4FF" font-size="8">Код страны</text>
    <text x="54" y="359" text-anchor="middle" fill="#6b6b7b" font-size="6">моноширинный</text>
  </g>

  <!-- Label: Back lats contour -->
  <g>
    <line x1="590" y1="210" x2="695" y2="195" stroke="#6b6b7b" stroke-width="0.5" stroke-dasharray="2,2"/>
    <circle cx="590" cy="210" r="2" fill="#00D4FF"/>
    <rect x="695" y="181" width="92" height="28" rx="3" fill="#1a1a28" stroke="#6b6b7b" stroke-width="0.5"/>
    <text x="741" y="195" text-anchor="middle" fill="#00D4FF" font-size="8">Контур спины</text>
    <text x="741" y="205" text-anchor="middle" fill="#6b6b7b" font-size="6">трапеции + широчайшие</text>
  </g>

  <!-- Label: Athlete name -->
  <g>
    <line x1="560" y1="252" x2="695" y2="240" stroke="#6b6b7b" stroke-width="0.5" stroke-dasharray="2,2"/>
    <circle cx="560" cy="252" r="2" fill="#00D4FF"/>
    <rect x="695" y="226" width="92" height="28" rx="3" fill="#1a1a28" stroke="#6b6b7b" stroke-width="0.5"/>
    <text x="741" y="240" text-anchor="middle" fill="#00D4FF" font-size="8">Фамилия</text>
    <text x="741" y="250" text-anchor="middle" fill="#6b6b7b" font-size="6">инженерный шрифт</text>
  </g>

  <!-- Bottom specs bar -->
  <rect x="0" y="560" width="800" height="40" fill="#1a1a28"/>
  <text x="130" y="584" text-anchor="middle" fill="#6b6b7b" font-size="9">ВЕС: ~220 г</text>
  <text x="330" y="584" text-anchor="middle" fill="#6b6b7b" font-size="9">ТКАНЬ: зональная 90-220 г/м2</text>
  <text x="530" y="584" text-anchor="middle" fill="#6b6b7b" font-size="9">ДЕКОР: только печать</text>
  <text x="700" y="584" text-anchor="middle" fill="#6b6b7b" font-size="9">КРОМКИ: лазерная обрезка</text>
  <line x1="220" y1="570" x2="220" y2="590" stroke="#6b6b7b" stroke-width="0.3" opacity="0.3"/>
  <line x1="430" y1="570" x2="430" y2="590" stroke="#6b6b7b" stroke-width="0.3" opacity="0.3"/>
  <line x1="625" y1="570" x2="625" y2="590" stroke="#6b6b7b" stroke-width="0.3" opacity="0.3"/>
</svg>