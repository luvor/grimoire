<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <style>
      text { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="800" height="600" fill="#14141f"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#d4a574" font-size="16" font-weight="600" letter-spacing="3">КОНЦЕПТ «ГЛАДИАТОР»</text>
  <line x1="250" y1="45" x2="550" y2="45" stroke="#d4a574" stroke-width="0.5" opacity="0.4"/>
  <text x="400" y="62" text-anchor="middle" fill="#6b6b7b" font-size="11" letter-spacing="1">ФРОНТАЛЬНЫЙ И ЗАДНИЙ ВИД</text>

  <!-- ==================== FRONT VIEW ==================== -->
  <g transform="translate(250, 75)">
    <text x="0" y="0" text-anchor="middle" fill="#e8e6e3" font-size="12" font-weight="600" opacity="0.6">ПЕРЕД</text>

    <!-- Head -->
    <ellipse cx="0" cy="30" rx="22" ry="26" fill="#2a2a3a"/>
    <!-- Neck -->
    <rect x="-10" y="54" width="20" height="14" rx="4" fill="#2a2a3a"/>

    <!-- Wide shoulder straps (15cm) -->
    <path d="M-50,68 L-55,72 L-58,82 L-52,86 L-42,78 L-35,72 L-25,68 Z" fill="#1a1a28" stroke="#d4a574" stroke-width="1.2"/>
    <path d="M50,68 L55,72 L58,82 L52,86 L42,78 L35,72 L25,68 Z" fill="#1a1a28" stroke="#d4a574" stroke-width="1.2"/>

    <!-- Strap connectors to torso -->
    <path d="M-25,68 L-18,65 L-10,66 L0,66 L10,66 L18,65 L25,68" fill="none" stroke="#d4a574" stroke-width="0.8" opacity="0.6"/>

    <!-- Main torso body -->
    <path d="M-48,75 L-52,100 L-54,130 L-52,160 L-48,175 L-42,182 L-30,188 L-18,195 L-18,280 L-12,285 L0,282 L12,285 L18,280 L18,195 L30,188 L42,182 L48,175 L52,160 L54,130 L52,100 L48,75 L35,70 L25,68 L-25,68 L-35,70 Z" fill="#1a1a28" stroke="#d4a574" stroke-width="1"/>

    <!-- 6 horizontal chest armor segments -->
    <line x1="-32" y1="85" x2="32" y2="85" stroke="#d4a574" stroke-width="0.8" opacity="0.8"/>
    <line x1="-36" y1="100" x2="36" y2="100" stroke="#d4a574" stroke-width="0.8" opacity="0.8"/>
    <line x1="-38" y1="115" x2="38" y2="115" stroke="#d4a574" stroke-width="0.8" opacity="0.8"/>
    <line x1="-38" y1="130" x2="38" y2="130" stroke="#d4a574" stroke-width="0.8" opacity="0.8"/>
    <line x1="-36" y1="145" x2="36" y2="145" stroke="#d4a574" stroke-width="0.8" opacity="0.8"/>
    <line x1="-32" y1="160" x2="32" y2="160" stroke="#d4a574" stroke-width="0.8" opacity="0.8"/>

    <!-- Subtle panel fill to show segments -->
    <rect x="-34" y="85" width="68" height="14" rx="1" fill="#d4a574" opacity="0.04"/>
    <rect x="-37" y="100" width="74" height="14" rx="1" fill="#d4a574" opacity="0.04"/>
    <rect x="-38" y="115" width="76" height="14" rx="1" fill="#d4a574" opacity="0.04"/>
    <rect x="-38" y="130" width="76" height="14" rx="1" fill="#d4a574" opacity="0.04"/>
    <rect x="-36" y="145" width="72" height="14" rx="1" fill="#d4a574" opacity="0.04"/>

    <!-- Shield with national emblem on left chest -->
    <path d="M-22,88 L-12,85 L-12,105 L-17,112 L-22,105 Z" fill="#1a1a28" stroke="#d4a574" stroke-width="1.5"/>
    <!-- Emblem inside shield -->
    <circle cx="-17" cy="96" r="5" fill="none" stroke="#d4a574" stroke-width="0.8"/>
    <path d="M-17,92 L-15,95 L-17,94 L-19,95 Z" fill="#d4a574" opacity="0.6"/>

    <!-- V-shaped waistline -->
    <path d="M-48,172 L0,188 L48,172" fill="none" stroke="#d4a574" stroke-width="1.8"/>

    <!-- Side vertical strips on shorts -->
    <line x1="-18" y1="195" x2="-18" y2="280" stroke="#d4a574" stroke-width="2" opacity="0.5"/>
    <line x1="18" y1="195" x2="18" y2="280" stroke="#d4a574" stroke-width="2" opacity="0.5"/>

    <!-- Shorts bottom edge -->
    <path d="M-18,280 L-12,285 L0,282 L12,285 L18,280" fill="none" stroke="#d4a574" stroke-width="0.8"/>

    <!-- Arms (exposed skin) -->
    <path d="M-52,75 L-72,88 L-88,118 L-92,155 L-84,158 L-78,125 L-65,95 L-55,80 Z" fill="#2a2a3a"/>
    <path d="M52,75 L72,88 L88,118 L92,155 L84,158 L78,125 L65,95 L55,80 Z" fill="#2a2a3a"/>
    <!-- Hands -->
    <ellipse cx="-90" cy="160" rx="8" ry="10" fill="#2a2a3a"/>
    <ellipse cx="90" cy="160" rx="8" ry="10" fill="#2a2a3a"/>

    <!-- Legs below shorts -->
    <path d="M-12,285 L-16,330 L-20,375 L-22,420 L-10,422 L-8,380 L-6,335 L0,285 Z" fill="#2a2a3a"/>
    <path d="M12,285 L16,330 L20,375 L22,420 L10,422 L8,380 L6,335 L0,285 Z" fill="#2a2a3a"/>

    <!-- Feet -->
    <ellipse cx="-16" cy="425" rx="12" ry="6" fill="#2a2a3a"/>
    <ellipse cx="16" cy="425" rx="12" ry="6" fill="#2a2a3a"/>
  </g>

  <!-- ==================== BACK VIEW ==================== -->
  <g transform="translate(560, 75)">
    <text x="0" y="0" text-anchor="middle" fill="#e8e6e3" font-size="12" font-weight="600" opacity="0.6">СПИНА</text>

    <!-- Head -->
    <ellipse cx="0" cy="30" rx="22" ry="26" fill="#2a2a3a"/>
    <!-- Neck -->
    <rect x="-10" y="54" width="20" height="14" rx="4" fill="#2a2a3a"/>

    <!-- Wide shoulder straps (back) -->
    <path d="M-50,68 L-55,72 L-58,82 L-52,86 L-42,78 L-35,72 L-25,68 Z" fill="#1a1a28" stroke="#d4a574" stroke-width="1.2"/>
    <path d="M50,68 L55,72 L58,82 L52,86 L42,78 L35,72 L25,68 Z" fill="#1a1a28" stroke="#d4a574" stroke-width="1.2"/>

    <!-- Main torso body (back) -->
    <path d="M-48,75 L-52,100 L-54,130 L-52,160 L-48,175 L-42,182 L-30,188 L-18,195 L-18,280 L-12,285 L0,282 L12,285 L18,280 L18,195 L30,188 L42,182 L48,175 L52,160 L54,130 L52,100 L48,75 L35,70 L25,68 L-25,68 L-35,70 Z" fill="#1a1a28" stroke="#d4a574" stroke-width="1"/>

    <!-- Central vertical spine line -->
    <line x1="0" y1="68" x2="0" y2="180" stroke="#d4a574" stroke-width="2" opacity="0.9"/>

    <!-- 4 pairs of diagonal ribs (lats pattern) -->
    <!-- Pair 1 -->
    <line x1="0" y1="82" x2="-30" y2="95" stroke="#d4a574" stroke-width="1" opacity="0.7"/>
    <line x1="0" y1="82" x2="30" y2="95" stroke="#d4a574" stroke-width="1" opacity="0.7"/>
    <!-- Pair 2 -->
    <line x1="0" y1="100" x2="-35" y2="118" stroke="#d4a574" stroke-width="1" opacity="0.7"/>
    <line x1="0" y1="100" x2="35" y2="118" stroke="#d4a574" stroke-width="1" opacity="0.7"/>
    <!-- Pair 3 -->
    <line x1="0" y1="118" x2="-38" y2="140" stroke="#d4a574" stroke-width="1" opacity="0.7"/>
    <line x1="0" y1="118" x2="38" y2="140" stroke="#d4a574" stroke-width="1" opacity="0.7"/>
    <!-- Pair 4 -->
    <line x1="0" y1="136" x2="-36" y2="162" stroke="#d4a574" stroke-width="1" opacity="0.7"/>
    <line x1="0" y1="136" x2="36" y2="162" stroke="#d4a574" stroke-width="1" opacity="0.7"/>

    <!-- Country code "RUS" between shoulder blades -->
    <text x="0" y="92" text-anchor="middle" fill="#d4a574" font-size="20" font-weight="600" letter-spacing="6" opacity="0.15">RUS</text>

    <!-- V-shaped waistline (back) -->
    <path d="M-48,172 L0,188 L48,172" fill="none" stroke="#d4a574" stroke-width="1.8"/>

    <!-- Side vertical strips on shorts (back) -->
    <line x1="-18" y1="195" x2="-18" y2="280" stroke="#d4a574" stroke-width="2" opacity="0.5"/>
    <line x1="18" y1="195" x2="18" y2="280" stroke="#d4a574" stroke-width="2" opacity="0.5"/>

    <!-- Arms (exposed) -->
    <path d="M-52,75 L-72,88 L-88,118 L-92,155 L-84,158 L-78,125 L-65,95 L-55,80 Z" fill="#2a2a3a"/>
    <path d="M52,75 L72,88 L88,118 L92,155 L84,158 L78,125 L65,95 L55,80 Z" fill="#2a2a3a"/>
    <ellipse cx="-90" cy="160" rx="8" ry="10" fill="#2a2a3a"/>
    <ellipse cx="90" cy="160" rx="8" ry="10" fill="#2a2a3a"/>

    <!-- Legs -->
    <path d="M-12,285 L-16,330 L-20,375 L-22,420 L-10,422 L-8,380 L-6,335 L0,285 Z" fill="#2a2a3a"/>
    <path d="M12,285 L16,330 L20,375 L22,420 L10,422 L8,380 L6,335 L0,285 Z" fill="#2a2a3a"/>
    <ellipse cx="-16" cy="425" rx="12" ry="6" fill="#2a2a3a"/>
    <ellipse cx="16" cy="425" rx="12" ry="6" fill="#2a2a3a"/>
  </g>

  <!-- ==================== LABELS WITH LEADER LINES ==================== -->

  <!-- Label: Wide shoulder straps -->
  <g>
    <line x1="200" y1="143" x2="88" y2="143" stroke="#6b6b7b" stroke-width="0.5" stroke-dasharray="2,2"/>
    <circle cx="200" cy="143" r="2" fill="#d4a574"/>
    <rect x="12" y="132" width="76" height="22" rx="3" fill="#1a1a28" stroke="#6b6b7b" stroke-width="0.5"/>
    <text x="50" y="147" text-anchor="middle" fill="#e8e6e3" font-size="8">Наплечники</text>
  </g>

  <!-- Label: Chest armor panels -->
  <g>
    <line x1="302" y1="190" x2="350" y2="190" stroke="#6b6b7b" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="350" y1="190" x2="380" y2="170" stroke="#6b6b7b" stroke-width="0.5" stroke-dasharray="2,2"/>
    <circle cx="302" cy="190" r="2" fill="#d4a574"/>
    <rect x="380" y="159" width="98" height="22" rx="3" fill="#1a1a28" stroke="#6b6b7b" stroke-width="0.5"/>
    <text x="429" y="174" text-anchor="middle" fill="#e8e6e3" font-size="8">6 панелей кирасы</text>
  </g>

  <!-- Label: Shield emblem -->
  <g>
    <line x1="228" y1="172" x2="165" y2="172" stroke="#6b6b7b" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="165" y1="172" x2="130" y2="195" stroke="#6b6b7b" stroke-width="0.5" stroke-dasharray="2,2"/>
    <circle cx="228" cy="172" r="2" fill="#d4a574"/>
    <rect x="20" y="184" width="110" height="22" rx="3" fill="#1a1a28" stroke="#6b6b7b" stroke-width="0.5"/>
    <text x="75" y="199" text-anchor="middle" fill="#e8e6e3" font-size="8">Щит с символикой</text>
  </g>

  <!-- Label: V-waistline -->
  <g>
    <line x1="250" y1="258" x2="130" y2="258" stroke="#6b6b7b" stroke-width="0.5" stroke-dasharray="2,2"/>
    <circle cx="250" cy="258" r="2" fill="#d4a574"/>
    <rect x="18" y="247" width="112" height="22" rx="3" fill="#1a1a28" stroke="#6b6b7b" stroke-width="0.5"/>
    <text x="74" y="262" text-anchor="middle" fill="#e8e6e3" font-size="8">V-образная талия</text>
  </g>

  <!-- Label: Side strips -->
  <g>
    <line x1="268" y1="325" x2="130" y2="325" stroke="#6b6b7b" stroke-width="0.5" stroke-dasharray="2,2"/>
    <circle cx="268" cy="325" r="2" fill="#d4a574"/>
    <rect x="12" y="314" width="118" height="22" rx="3" fill="#1a1a28" stroke="#6b6b7b" stroke-width="0.5"/>
    <text x="71" y="329" text-anchor="middle" fill="#e8e6e3" font-size="8">Вертикальные полосы</text>
  </g>

  <!-- Label: Spine line (back) -->
  <g>
    <line x1="560" y1="200" x2="660" y2="200" stroke="#6b6b7b" stroke-width="0.5" stroke-dasharray="2,2"/>
    <line x1="660" y1="200" x2="695" y2="180" stroke="#6b6b7b" stroke-width="0.5" stroke-dasharray="2,2"/>
    <circle cx="560" cy="200" r="2" fill="#d4a574"/>
    <rect x="695" y="169" width="92" height="22" rx="3" fill="#1a1a28" stroke="#6b6b7b" stroke-width="0.5"/>
    <text x="741" y="184" text-anchor="middle" fill="#e8e6e3" font-size="8">Осевая линия</text>
  </g>

  <!-- Label: Diagonal ribs (back) -->
  <g>
    <line x1="596" y1="215" x2="695" y2="215" stroke="#6b6b7b" stroke-width="0.5" stroke-dasharray="2,2"/>
    <circle cx="596" cy="215" r="2" fill="#d4a574"/>
    <rect x="695" y="204" width="92" height="22" rx="3" fill="#1a1a28" stroke="#6b6b7b" stroke-width="0.5"/>
    <text x="741" y="219" text-anchor="middle" fill="#e8e6e3" font-size="8">Рёбра (4 пары)</text>
  </g>

  <!-- Label: Country code (back) -->
  <g>
    <line x1="560" y1="160" x2="695" y2="140" stroke="#6b6b7b" stroke-width="0.5" stroke-dasharray="2,2"/>
    <circle cx="560" cy="160" r="2" fill="#d4a574"/>
    <rect x="695" y="129" width="92" height="22" rx="3" fill="#1a1a28" stroke="#6b6b7b" stroke-width="0.5"/>
    <text x="741" y="144" text-anchor="middle" fill="#e8e6e3" font-size="8">Код страны</text>
  </g>

  <!-- Bottom specs bar -->
  <rect x="0" y="560" width="800" height="40" fill="#1a1a28"/>
  <text x="130" y="584" text-anchor="middle" fill="#6b6b7b" font-size="9">ВЕС: ~320 г</text>
  <text x="310" y="584" text-anchor="middle" fill="#6b6b7b" font-size="9">МАТЕРИАЛ: полиамид/эластан 80/20</text>
  <text x="520" y="584" text-anchor="middle" fill="#6b6b7b" font-size="9">ПАНЕЛИ: EVA-пена 2мм</text>
  <text x="700" y="584" text-anchor="middle" fill="#6b6b7b" font-size="9">ДЕКОР: силикон 0.8мм</text>
  <line x1="210" y1="570" x2="210" y2="590" stroke="#6b6b7b" stroke-width="0.3" opacity="0.3"/>
  <line x1="420" y1="570" x2="420" y2="590" stroke="#6b6b7b" stroke-width="0.3" opacity="0.3"/>
  <line x1="620" y1="570" x2="620" y2="590" stroke="#6b6b7b" stroke-width="0.3" opacity="0.3"/>
</svg>