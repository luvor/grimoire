<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>{{ARTICLE_TITLE}} — Grimoire</title>
  <meta name="description" content="{{ARTICLE_EXCERPT}}">
  <meta property="og:title" content="{{ARTICLE_TITLE}} — Grimoire">
  <meta property="og:description" content="{{ARTICLE_EXCERPT}}">
  <meta property="og:image" content="{{COVER_IMAGE_URL}}">
  <meta property="og:type" content="article">
  <!-- PWA -->
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Grimoire">
  <link rel="manifest" href="../../manifest.webmanifest">
  <link rel="apple-touch-icon" href="../../assets/images/apple-touch-icon.png">
  <link rel="icon" href="../../assets/images/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../../assets/css/main.css">
  <link rel="stylesheet" href="../../assets/css/article.css">
  <style>
    body:not(.loaded) { opacity: 0; }
    body.loaded { opacity: 1; transition: opacity 0.6s ease; }
  </style>
</head>
<body>

  <!-- Reading Progress -->
  <div class="reading-progress" aria-hidden="true"></div>

  <!-- Navigation -->
  <nav class="site-nav" role="navigation" aria-label="Навигация">
    <a href="../../" class="nav-logo">
      Grimoire <span>グリモワール</span>
    </a>
  </nav>

  <!-- Article Hero -->
  <header class="article-hero">
    <div class="article-hero-image">
      <img src="cover.svg" alt="{{ARTICLE_TITLE}}">
    </div>
    <div class="article-hero-content">
      <span class="article-category">{{CATEGORY}}</span>
      <h1 class="article-title">{{ARTICLE_TITLE}}</h1>
      <p class="article-subtitle">{{ARTICLE_SUBTITLE}}</p>
      <div class="article-meta">
        <span class="article-meta-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          {{DATE}}
        </span>
        <span class="article-meta-divider"></span>
        <span class="article-meta-item" data-reading-time>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
          Считаем...
        </span>
      </div>
    </div>
  </header>

  <!-- TOC Sidebar (auto-generated by JS) -->
  <aside class="toc-sidebar" aria-label="Содержание">
    <div class="toc-title">Содержание</div>
    <ol class="toc-list"></ol>
  </aside>

  <!-- Article Content -->
  <article class="article-layout">
    <div class="article-body">

      {{ARTICLE_CONTENT}}

      <!-- Footnotes Section (if needed) -->
      <!--
      <section class="footnotes">
        <h2>Источники</h2>
        <ol>
          <li id="fn-1">Source text <a href="#fnref-1">↩</a></li>
        </ol>
      </section>
      -->

    </div>
  </article>

  <!-- Article Footer -->
  <div class="article-footer">
    <div class="article-tags">
      {{TAGS}}
    </div>

    <!--
    <a href="../next-article/" class="next-article">
      <div class="next-article-label">Следующее заклинание</div>
      <div class="next-article-title">{{NEXT_ARTICLE_TITLE}}</div>
    </a>
    -->
  </div>

  <!-- Back to Top -->
  <button class="back-to-top" aria-label="Наверх">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 15l-6-6-6 6"/>
    </svg>
  </button>

  <!-- Site Footer -->
  <footer class="site-footer">
    <div class="footer-divider" aria-hidden="true"></div>
    <div class="footer-logo">Grimoire</div>
    <ul class="footer-links">
      <li><a href="../../">Все статьи</a></li>
      <li><a href="https://github.com/luvor/grimoire" target="_blank" rel="noopener">GitHub</a></li>
    </ul>
    <p class="footer-copy">Каждая идея заслуживает глубокого исследования.</p>
  </footer>

  <script src="../../assets/js/main.js"></script>
  <script src="../../assets/js/article.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('../../sw.js', { scope: '/grimoire/' }).catch(() => {});
    }
  </script>
</body>
</html>
